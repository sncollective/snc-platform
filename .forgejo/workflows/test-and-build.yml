name: Test & Build

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:

jobs:
  # ── Test (parallel) ──
  test-shared:
    runs-on: docker
    container: node:24
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        run: |
          corepack enable
          corepack install

      - uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test @snc/shared
        run: pnpm --filter @snc/shared test

  test-api:
    runs-on: docker
    container: node:24
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        run: |
          corepack enable
          corepack install

      - uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test @snc/api
        run: pnpm --filter @snc/api test

  test-web:
    runs-on: docker
    container: node:24
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        run: |
          corepack enable
          corepack install

      - uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test @snc/web
        run: pnpm --filter @snc/web test

  # ── Validate migrations ──
  validate-migrations:
    runs-on: docker
    container: node:24
    steps:
      - uses: actions/checkout@v4

      - name: Validate migration artifacts
        run: bash apps/api/scripts/validate-migrations.sh

  # ── E2E Tests ──
  test-e2e:
    runs-on: docker
    container: mcr.microsoft.com/playwright:v1.52.0-noble
    needs: [test-shared, test-api, test-web, validate-migrations]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: snc
          POSTGRES_PASSWORD: snc
          POSTGRES_DB: snc
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        run: |
          corepack enable
          corepack install

      - uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: pnpm --filter @snc/api db:migrate
        env:
          DATABASE_URL: postgres://snc:snc@postgres:5432/snc

      - name: Seed demo data
        run: pnpm --filter @snc/api seed:demo
        env:
          DATABASE_URL: postgres://snc:snc@postgres:5432/snc

      - name: Run e2e tests
        run: pnpm --filter @snc/e2e test
        env:
          CI: "true"
          DATABASE_URL: postgres://snc:snc@postgres:5432/snc
          BETTER_AUTH_SECRET: e2e-test-secret-that-is-at-least-thirty-two-chars-long
          BETTER_AUTH_URL: http://localhost:3001
          CORS_ORIGIN: http://localhost:3001
          FEATURE_CONTENT: "true"
          FEATURE_CREATOR: "true"
          FEATURE_ADMIN: "true"
          FEATURE_CALENDAR: "true"
          FEATURE_SUBSCRIPTION: "false"
          FEATURE_MERCH: "false"
          FEATURE_BOOKING: "false"
          FEATURE_DASHBOARD: "false"
          FEATURE_EMISSIONS: "false"
          FEATURE_FEDERATION: "false"
          FEATURE_STREAMING: "false"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          retention-days: 14

  # ── Build ──
  build:
    runs-on: docker
    container: node:24
    needs: [test-shared, test-api, test-web, validate-migrations]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        run: |
          corepack enable
          corepack install

      - uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
