name: Test & Build

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:

jobs:
  # ── Test (parallel) ──
  test-shared:
    runs-on: docker
    container: node:24
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        run: |
          corepack enable
          corepack install

      - uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test @snc/shared
        run: pnpm --filter @snc/shared test

  test-api:
    runs-on: docker
    container: node:24
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        run: |
          corepack enable
          corepack install

      - uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test @snc/api
        run: pnpm --filter @snc/api test

  test-web:
    runs-on: docker
    container: node:24
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        run: |
          corepack enable
          corepack install

      - uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test @snc/web
        run: pnpm --filter @snc/web test

  # ── Validate migrations ──
  validate-migrations:
    runs-on: docker
    container: node:24
    steps:
      - uses: actions/checkout@v4

      - name: Validate migration artifacts
        run: bash scripts/validate-migrations.sh

  # ── Build ──
  build:
    runs-on: docker
    container: node:24
    needs: [test-shared, test-api, test-web, validate-migrations]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        run: |
          corepack enable
          corepack install

      - uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
