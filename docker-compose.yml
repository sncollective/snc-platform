services:
  postgres:
    image: postgres:16
    container_name: snc-postgres
    environment:
      POSTGRES_USER: snc
      POSTGRES_PASSWORD: snc
      POSTGRES_DB: snc
    ports:
      - "5432:5432"
    volumes:
      - snc-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snc -d snc"]
      interval: 5s
      timeout: 5s
      retries: 5
  snc-srs:
    image: ossrs/srs:6
    container_name: snc-srs
    command: objs/srs -c conf/srs.conf
    ports:
      - "1935:1935"
      - "1985:1985"
      - "8080:8080"
    volumes:
      - ./srs.conf:/usr/local/srs/conf/srs.conf
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/1985"]
      interval: 5s
      timeout: 3s
      retries: 3

  snc-garage:
    image: dxflrs/garage:v2.2.0
    container_name: snc-garage
    ports:
      - "3900:3900"
      - "3903:3903"
    volumes:
      - ./garage.toml:/etc/garage.toml
      - snc-garage-meta:/var/lib/garage/meta
      - snc-garage-data:/var/lib/garage/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/garage", "stats"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  snc-pgdata:
  snc-garage-meta:
  snc-garage-data:
