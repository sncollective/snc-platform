services:
  postgres:
    image: postgres:16
    container_name: snc-postgres
    environment:
      POSTGRES_USER: snc
      POSTGRES_PASSWORD: snc
      POSTGRES_DB: snc
    ports:
      - "5432:5432"
    volumes:
      - snc-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snc -d snc"]
      interval: 5s
      timeout: 5s
      retries: 5
  snc-srs:
    image: ossrs/srs:6
    container_name: snc-srs
    command: objs/srs -c conf/srs.conf
    ports:
      - "1935:1935"
      - "1985:1985"
      - "8080:8080"
    volumes:
      - ./srs.conf:/usr/local/srs/conf/srs.conf
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/1985"]
      interval: 5s
      timeout: 3s
      retries: 3

  snc-garage:
    image: dxflrs/garage:v2.2.0
    container_name: snc-garage
    ports:
      - "3900:3900"
      - "3903:3903"
    volumes:
      - ./garage.toml:/etc/garage.toml
      - snc-garage-meta:/var/lib/garage/meta
      - snc-garage-data:/var/lib/garage/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/garage", "stats"]
      interval: 5s
      timeout: 3s
      retries: 5

  snc-liquidsoap:
    build: ./liquidsoap
    container_name: snc-liquidsoap
    restart: unless-stopped
    volumes:
      - ./liquidsoap/playout.liq:/etc/liquidsoap/playout.liq:ro
      - ./liquidsoap/playlist.m3u:/etc/liquidsoap/playlist.m3u
    command: ["/etc/liquidsoap/playout.liq"]
    ports:
      - "8888:8888"
      - "1936:1936"
    environment:
      PLAYOUT_STREAM_KEY: ${PLAYOUT_STREAM_KEY:-}
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: garage
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8888/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  snc-pgdata:
  snc-garage-meta:
  snc-garage-data:
