services:
  postgres:
    image: postgres:16
    container_name: snc-postgres
    environment:
      POSTGRES_USER: snc
      POSTGRES_PASSWORD: snc
      POSTGRES_DB: snc
    ports:
      - "5432:5432"
    volumes:
      - snc-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snc -d snc"]
      interval: 5s
      timeout: 5s
      retries: 5
  snc-srs:
    image: ossrs/srs:6
    container_name: snc-srs
    command: objs/srs -c conf/srs.conf
    ports:
      - "1935:1935"
      - "1985:1985"
      - "8080:8080"
    volumes:
      - ./srs.conf:/usr/local/srs/conf/srs.conf
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/1985"]
      interval: 5s
      timeout: 3s
      retries: 3

  snc-garage:
    image: dxflrs/garage:v2.2.0
    container_name: snc-garage
    ports:
      - "3900:3900"
      - "3903:3903"
    volumes:
      - ./garage.toml:/etc/garage.toml
      - snc-garage-meta:/var/lib/garage/meta
      - snc-garage-data:/var/lib/garage/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/garage", "stats"]
      interval: 5s
      timeout: 3s
      retries: 5

  snc-liquidsoap:
    build: ./liquidsoap
    container_name: snc-liquidsoap
    restart: unless-stopped
    volumes:
      - ./liquidsoap:/etc/liquidsoap
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["/etc/liquidsoap/playout.liq"]
    ports:
      - "8888:8888"
      - "1936:1936"
    environment:
      PLAYOUT_STREAM_KEY: ${PLAYOUT_STREAM_KEY:-}
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: garage
      AWS_ENDPOINT: http://snc-garage:3900
      SRS_RTMP_HOST: snc-srs
      API_CALLBACK_HOST: ${API_CALLBACK_HOST:-host.docker.internal}
      API_CALLBACK_PORT: "3000"
      PLAYOUT_CALLBACK_SECRET: ${PLAYOUT_CALLBACK_SECRET:-}
      CHANNEL_SNCTV_STREAM: ${CHANNEL_SNCTV_STREAM:-snc-tv}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8888/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  snc-imgproxy:
    image: ghcr.io/imgproxy/imgproxy:v3
    container_name: snc-imgproxy
    environment:
      IMGPROXY_USE_S3: "true"
      IMGPROXY_S3_ENDPOINT: "http://snc-garage:3900"
      IMGPROXY_S3_ENDPOINT_USE_PATH_STYLE: "true"
      IMGPROXY_S3_REGION: "garage"
      AWS_ACCESS_KEY_ID: "${GARAGE_IMGPROXY_ACCESS_KEY:-}"
      AWS_SECRET_ACCESS_KEY: "${GARAGE_IMGPROXY_SECRET_KEY:-}"
      IMGPROXY_KEY: "${IMGPROXY_KEY:-}"
      IMGPROXY_SALT: "${IMGPROXY_SALT:-}"
      IMGPROXY_ENFORCE_WEBP: "true"
      IMGPROXY_ENFORCE_AVIF: "true"
      IMGPROXY_QUALITY: "80"
      IMGPROXY_FORMAT_QUALITY: "webp=79,avif=50,jpeg=80"
      IMGPROXY_TTL: "31536000"
      IMGPROXY_MAX_SRC_RESOLUTION: "50"
      IMGPROXY_STRIP_METADATA: "true"
      IMGPROXY_AUTO_ROTATE: "true"
    ports:
      - "8081:8080"
    depends_on:
      snc-garage:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  snc-pgdata:
  snc-garage-meta:
  snc-garage-data:
