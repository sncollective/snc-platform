listen 1935;
max_connections 100;
daemon off;
srs_log_tank console;

http_server {
    enabled on;
    listen 8080;
    dir /usr/local/srs/objs/nginx/html;
    crossdomain on;
}

http_api {
    enabled on;
    listen 1985;
    crossdomain on;
    raw_api {
        enabled on;
        allow_reload on;
    }
}

vhost __defaultVhost__ {
    hls {
        enabled on;
        hls_fragment 2;
        hls_window 10;
    }

    http_hooks {
        enabled on;
        # Callback URLs carry ?secret=<SRS_CALLBACK_SECRET> so verify-srs-callback can authenticate them.
        # SRS 6 does not substitute env vars in config; the secret is hardcoded here to match the dev default
        # in platform/.env.example. If SRS_CALLBACK_SECRET is rotated in .env, update this file to match.
        # Prod uses deploy/srs.conf.prod.example which gets sed-templated at deploy time.
        on_publish http://host.docker.internal:3000/api/streaming/callbacks/on-publish?secret=dev-srs-callback-secret-not-for-production-32;
        on_unpublish http://host.docker.internal:3000/api/streaming/callbacks/on-unpublish?secret=dev-srs-callback-secret-not-for-production-32;
    }

    forward {
        enabled on;
        backend http://host.docker.internal:3000/api/streaming/callbacks/on-forward?secret=dev-srs-callback-secret-not-for-production-32;
    }
}
